    <path d="M344 156 424 198v70c0 65-34 109-80 137-46-28-80-72-80-137v-70l80-42Z" fill="url(#vault-shield)" stroke="url(#vault-frame)" stroke-width="5" stroke-linejoin="round"/>
    <path d="M344 177 404 208v58c0 49-24 86-60 111-36-25-60-62-60-111v-58l60-31Z" fill="none" stroke="#76dcff" stroke-opacity=".22" stroke-width="3"/>

    <path d="M308 254v-22c0-25 16-46 36-46s36 21 36 46v22" fill="none" stroke="#071020" stroke-opacity=".9" stroke-width="16" stroke-linecap="round"/>
    <path d="M308 254v-22c0-25 16-46 36-46s36 21 36 46v22" fill="none" stroke="url(#vault-gold)" stroke-width="8" stroke-linecap="round"/>
    <rect x="296" y="247" width="96" height="82" rx="20" fill="#09152c" stroke="#071020" stroke-width="13"/>
    <rect x="296" y="247" width="96" height="82" rx="20" fill="#0d1b35" stroke="url(#vault-gold)" stroke-width="7"/>
    <path d="M310 263h68" stroke="#fff5bd" stroke-opacity=".32" stroke-width="3" stroke-linecap="round"/>
    <circle cx="344" cy="282" r="9" fill="url(#vault-gold)"/>
    <path d="M344 291v18" stroke="url(#vault-gold)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g opacity=".78">
    <circle cx="150" cy="131" r="5" fill="#5bd5ff"/>
    <circle cx="556" cy="409" r="5" fill="#a977ff"/>
    <path d="M150 146v22M139 157h22M556 373v22M545 384h22" stroke="url(#vault-frame)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
