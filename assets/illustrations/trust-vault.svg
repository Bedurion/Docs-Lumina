<svg width="2160" height="1620" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" role="img" aria-labelledby="title description">
  <title id="title">Protected Luminox vault</title>
  <desc id="description">A luminous vault door, shield and secure lock representing protected guild systems.</desc>
  <defs>
    <linearGradient id="vault-frame" x1="116" y1="86" x2="612" y2="458" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58d4ff"/>
      <stop offset=".48" stop-color="#aa78ff"/>
      <stop offset="1" stop-color="#f7d36f"/>
    </linearGradient>
    <linearGradient id="vault-shell" x1="138" y1="100" x2="574" y2="438" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172441"/>
      <stop offset=".52" stop-color="#0c1730"/>
      <stop offset="1" stop-color="#080f20"/>
    </linearGradient>
    <linearGradient id="vault-door" x1="236" y1="130" x2="452" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#152744"/>
      <stop offset=".55" stop-color="#0b1830"/>
      <stop offset="1" stop-color="#071020"/>
    </linearGradient>
    <linearGradient id="vault-shield" x1="292" y1="156" x2="398" y2="394" gradientUnits="userSpaceOnUse">
      <stop stop-color="#182b4d"/>
      <stop offset=".58" stop-color="#0d1932"/>
      <stop offset="1" stop-color="#080f21"/>
    </linearGradient>
    <linearGradient id="vault-gold" x1="302" y1="196" x2="385" y2="342" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff0a3"/>
      <stop offset=".42" stop-color="#f8cb57"/>
      <stop offset="1" stop-color="#c98a23"/>
    </linearGradient>
    <radialGradient id="vault-aura" cx="0" cy="0" r="1" gradientTransform="translate(354 266) rotate(90) scale(244 310)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9b6cff" stop-opacity=".28"/>
      <stop offset=".46" stop-color="#54cdf8" stop-opacity=".1"/>
      <stop offset="1" stop-color="#050914" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vault-core" cx="0" cy="0" r="1" gradientTransform="translate(344 265) rotate(90) scale(145)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9768ff" stop-opacity=".16"/>
      <stop offset=".72" stop-color="#091326" stop-opacity="0"/>
    </radialGradient>
    <filter id="vault-shadow" x="-25%" y="-28%" width="150%" height="175%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#02050e" flood-opacity=".58"/>
    </filter>
    <filter id="vault-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="356" cy="270" rx="316" ry="246" fill="url(#vault-aura)"/>
  <ellipse cx="356" cy="270" rx="278" ry="210" fill="none" stroke="url(#vault-frame)" stroke-opacity=".14" stroke-width="2"/>
  <path d="M62 270h588M356 42v456" stroke="#6ed9ff" stroke-opacity=".055" stroke-width="2"/>

  <g filter="url(#vault-shadow)">
    <rect x="106" y="78" width="506" height="384" rx="70" fill="url(#vault-shell)" stroke="url(#vault-frame)" stroke-width="4"/>
    <rect x="139" y="111" width="440" height="318" rx="52" fill="#091326" fill-opacity=".66" stroke="#72d8ff" stroke-opacity=".28" stroke-width="3"/>
    <path d="M588 192h27c12 0 21 9 21 21v114c0 12-9 21-21 21h-27" fill="#0a1428" stroke="url(#vault-gold)" stroke-width="6" stroke-linecap="round"/>
    <path d="M608 223h14M608 317h14" stroke="#fff0a3" stroke-opacity=".58" stroke-width="4" stroke-linecap="round"/>

    <circle cx="344" cy="270" r="151" fill="url(#vault-door)" stroke="url(#vault-frame)" stroke-width="5"/>
    <circle cx="344" cy="270" r="126" fill="url(#vault-core)" stroke="#9e72ff" stroke-opacity=".42" stroke-width="3"/>
    <circle cx="344" cy="270" r="101" fill="none" stroke="#66d8ff" stroke-opacity=".2" stroke-width="2" stroke-dasharray="5 10"/>

    <g fill="#0b1730" stroke="url(#vault-frame)" stroke-width="3">
      <circle cx="344" cy="136" r="9"/>
      <circle cx="439" cy="175" r="9"/>
      <circle cx="478" cy="270" r="9"/>
      <circle cx="439" cy="365" r="9"/>
      <circle cx="344" cy="404" r="9"/>
      <circle cx="249" cy="365" r="9"/>
      <circle cx="210" cy="270" r="9"/>
      <circle cx="249" cy="175" r="9"/>
    </g>

    <g fill="none" stroke-linecap="round">
      <path d="M344 180v35M344 325v35M254 270h35M399 270h35" stroke="#68d7ff" stroke-opacity=".34" stroke-width="7"/>
      <path d="M281 207l25 25M382 308l25 25M407 207l-25 25M306 308l-25 25" stroke="#ac7aff" stroke-opacity=".38" stroke-width="6"/>
    </g>
