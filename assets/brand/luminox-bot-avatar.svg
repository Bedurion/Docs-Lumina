<svg width="2048" height="2048" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">Luminox Discord bot avatar</title>
  <desc id="desc">A dark circular Lumina seal with a clean gold L and a red ruby, optimized for small Discord avatar sizes.</desc>
  <defs>
    <radialGradient id="avatarNight" cx="39%" cy="28%" r="82%">
      <stop offset="0" stop-color="#243452"/>
      <stop offset="0.5" stop-color="#111c35"/>
      <stop offset="1" stop-color="#050811"/>
    </radialGradient>
    <linearGradient id="avatarGold" x1="0.15" y1="0.06" x2="0.8" y2="0.96">
      <stop offset="0" stop-color="#fff9d7"/>
      <stop offset="0.2" stop-color="#ffe88f"/>
      <stop offset="0.54" stop-color="#f3c255"/>
      <stop offset="0.8" stop-color="#d58b25"/>
      <stop offset="1" stop-color="#9c5113"/>
    </linearGradient>
    <linearGradient id="avatarRing" x1="0.08" y1="0.05" x2="0.92" y2="0.95">
      <stop offset="0" stop-color="#fff2a4"/>
      <stop offset="0.28" stop-color="#f6c653"/>
      <stop offset="0.58" stop-color="#a96412"/>
      <stop offset="0.82" stop-color="#f3c44d"/>
      <stop offset="1" stop-color="#6e3408"/>
    </linearGradient>
    <linearGradient id="avatarRuby" x1="0.2" y1="0" x2="0.82" y2="1">
      <stop offset="0" stop-color="#ffb085"/>
      <stop offset="0.35" stop-color="#ff5a59"/>
      <stop offset="0.72" stop-color="#c41432"/>
      <stop offset="1" stop-color="#69091c"/>
    </linearGradient>
    <filter id="avatarShadow" x="-18%" y="-18%" width="136%" height="148%">
