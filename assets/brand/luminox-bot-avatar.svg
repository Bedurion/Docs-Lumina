    </filter>
    <filter id="avatarGlow" x="-12%" y="-12%" width="124%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#ffd875" flood-opacity="0.22"/>
    </filter>
  </defs>

  <circle cx="512" cy="512" r="504" fill="#02040a"/>
  <circle cx="512" cy="512" r="492" fill="url(#avatarNight)" stroke="#0a0c15" stroke-width="12"/>
