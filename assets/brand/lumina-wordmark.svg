<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 112" role="img" aria-labelledby="title desc">
  <title id="title">Lumina</title>
  <desc id="desc">A compact gold Lumina wordmark with a ruby accent.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff4b0"/>
      <stop offset="0.26" stop-color="#ffd85f"/>
      <stop offset="0.55" stop-color="#c98713"/>
      <stop offset="0.78" stop-color="#ffe27a"/>
      <stop offset="1" stop-color="#89520a"/>
    </linearGradient>
    <linearGradient id="ruby" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#ffb0a4"/>
      <stop offset="0.25" stop-color="#ff3b31"/>
      <stop offset="0.68" stop-color="#b30d16"/>
      <stop offset="1" stop-color="#570008"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-35%" width="140%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.2" result="blur"/>
      <feOffset dy="3" result="offset"/>
      <feColorMatrix in="offset" values="0 0 0 0 0.02 0 0 0 0 0.01 0 0 0 0 0 0 0 0 .9 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <path d="M13 69c22 5 37 4 53-4m228 0c16 8 31 9 53 4" fill="none" stroke="#8b5b10" stroke-linecap="round" stroke-width="4"/>
    <path d="M18 65c17 1 31-2 44-9m236 0c13 7 27 10 44 9" fill="none" stroke="#f5c94f" stroke-linecap="round" stroke-width="1.6"/>
    <text x="180" y="70" fill="url(#gold)" font-family="Georgia, 'Times New Roman', serif" font-size="70" font-weight="700" letter-spacing="-2.4" paint-order="stroke fill" stroke="#241000" stroke-linejoin="round" stroke-width="8" text-anchor="middle">LUMINA</text>
    <text x="180" y="68.5" fill="none" font-family="Georgia, 'Times New Roman', serif" font-size="70" font-weight="700" letter-spacing="-2.4" opacity=".72" stroke="#fff1a0" stroke-width="1" text-anchor="middle">LUMINA</text>
    <path d="m180 76 12 8-12 14-12-14Z" fill="url(#ruby)" paint-order="stroke fill" stroke="#160301" stroke-width="4"/>
    <path d="m180 79 7 5-7 8-7-8Z" fill="none" opacity=".8" stroke="#ffd3a0" stroke-width="1.2"/>
  </g>
</svg>
